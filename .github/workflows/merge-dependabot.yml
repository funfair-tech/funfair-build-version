name: "Dependabot: Merge updates"
on:
  # https://securitylab.github.com/research/github-actions-preventing-pwn-requests
  # could and should work, at least for public repos;
  # tracking issue for this action's issue:
  # https://github.com/ahmadnassri/action-dependabot-auto-merge/issues/60
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
  pull_request_review:
    types:
      - submitted
  check_suite:
    types:
      - completed
  status: { }

permissions:
  contents: read

jobs:
  auto-merge-dependabot-github-actions:

    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      startsWith(github.head_ref, 'dependabot/github_actions/')
    runs-on: [self-hosted, linux, build]

    permissions:
      contents: write
      pull-requests: write

    # Specifically check that dependabot (or another trusted party) created this pull-request, and that it has been labelled correctly.

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Check Required Secrets"
        if: github.repository_owner == 'funfair-tech'
        shell: bash
        run: |
          if [ -z "${{secrets.SOURCE_PUSH_TOKEN}}" ]; then
            echo "::error::SOURCE_PUSH_TOKEN is required but not set"
            exit 1
          fi

      - name: "Checkout Source"
        uses: actions/checkout@v6.0.2

      - name: "Auto-Merge"
        if: github.repository_owner == 'funfair-tech'
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
          script: |
            const mergeLabel = process.env.MERGE_LABEL;
            core.info(`ℹ️ Owner: ${context.repo.owner}`);
            core.info(`ℹ️ Event: ${context.eventName}`);

            let prNumber;
            if (context.eventName === 'pull_request' || context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request?.number;
            } else if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite?.pull_requests ?? [];
              if (prs.length === 0) {
                core.info('ℹ️ No PRs associated with this check_suite event');
                return;
              }
              prNumber = prs[0].number;
            } else if (context.eventName === 'status') {
              const sha = context.payload.sha;
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
              });
              if (prs.length === 0) {
                core.info('ℹ️ No PRs associated with this status event');
                return;
              }
              prNumber = prs[0].number;
            }

            if (!prNumber) {
              core.info('ℹ️ Unable to determine PR number');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.info(`ℹ️ PR #${prNumber}: ${pr.title}`);

            if (pr.head.repo?.fork) {
              core.info('⚠️ Skipping: PR is from a fork');
              return;
            }

            const labels = pr.labels.map(l => l.name);
            if (!labels.includes(mergeLabel)) {
              core.info(`⚠️ Skipping: PR does not have the '${mergeLabel}' label (has: ${labels.join(', ')})`);
              return;
            }

            await github.graphql(`
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: MERGE
                }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, { pullRequestId: pr.node_id });

            core.info(`✅ Auto-merge enabled for PR #${prNumber}: ${pr.title}`);
            core.notice(`Auto-merge enabled for PR #${prNumber}: ${pr.title}`);
        env:
          MERGE_LABEL: "github-actions"
